name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6
      - name: Fetch base ref for version-downgrade check
        run: git fetch --depth=1 origin main
      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment/cosmic_foundry.yml
          environment-name: cosmic_foundry
          cache-environment: true
          cache-downloads: true
      - name: Install package
        run: pip install -e .[dev,docs]
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  mypy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6
      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment/cosmic_foundry.yml
          environment-name: cosmic_foundry
          cache-environment: true
          cache-downloads: true
      - name: Install package
        run: pip install -e .[dev]
      - name: Run mypy
        run: mypy cosmic_foundry

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6
      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment/cosmic_foundry.yml
          environment-name: cosmic_foundry
          cache-environment: true
          cache-downloads: true
      - name: Install package
        run: pip install -e .[dev]
      - name: Run pytest
        run: pytest -q

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6
      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment/cosmic_foundry.yml
          environment-name: cosmic_foundry
          cache-environment: true
          cache-downloads: true
      - name: Install package
        run: pip install -e .[dev,docs]
      - name: Build docs
        run: sphinx-build -W docs docs/_build/html

  docs-integrity:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6
      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment/cosmic_foundry.yml
          environment-name: cosmic_foundry
          cache-environment: true
          cache-downloads: true
      - name: Markdown link integrity
        run: python scripts/ci/check_markdown_links.py
      - name: ADR index consistency
        run: python scripts/ci/check_adr_index.py
