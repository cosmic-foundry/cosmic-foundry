name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6
      - name: Fetch base ref for version-downgrade check
        run: git fetch --depth=1 origin main
      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment/cosmic_foundry.yml
          environment-name: cosmic_foundry
          cache-environment: true
          cache-downloads: true
      - name: Install package
        run: pip install -e .[dev,docs]
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  mypy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6
      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment/cosmic_foundry.yml
          environment-name: cosmic_foundry
          cache-environment: true
          cache-downloads: true
      - name: Install package
        run: pip install -e .[dev]
      - name: Run mypy
        run: mypy cosmic_foundry

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6
      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment/cosmic_foundry.yml
          environment-name: cosmic_foundry
          cache-environment: true
          cache-downloads: true
      - name: Install package
        run: pip install -e .[dev]
      - name: Run pytest
        env:
          CF_SOLVER_CONVERGENCE_BUDGET_S: "60"
          CF_INTEGRATOR_SESSION_BUDGET_S: "90"
        run: bash run_tests.sh -q

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6
      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment/cosmic_foundry.yml
          environment-name: cosmic_foundry
          cache-environment: true
          cache-downloads: true
      - name: Install package
        run: pip install -e .[dev,docs]
      - name: Build docs
        run: sphinx-build -W docs docs/_build/html
      - name: Check external links
        run: sphinx-build -b linkcheck -W docs docs/_build/linkcheck
      - name: Upload pages artifact
        # Upload on every successful build so the deploy job can consume it
        # on pushes to main.  The artifact is ignored (but harmless) on PRs.
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  deploy-docs:
    needs: docs
    runs-on: ubuntu-latest
    # Deploy only when changes land on main, not on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

  docs-integrity:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6
      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment/cosmic_foundry.yml
          environment-name: cosmic_foundry
          cache-environment: true
          cache-downloads: true
      - name: Markdown link integrity
        run: python scripts/ci/check_markdown_links.py
