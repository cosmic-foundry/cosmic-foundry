name: Secret scanning

# Run on every push to any branch and on every PR so secrets are caught
# as early as possible — before a PR is even opened, and again on every
# subsequent push to the PR branch.
on:
  push:
    branches-ignore:
      - "dependabot/**"   # bot branches use scoped tokens, not secrets
  pull_request:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Detect hardcoded secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so all commits on the branch are scanned
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
