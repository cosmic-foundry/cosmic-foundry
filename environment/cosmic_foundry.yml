name: cosmic_foundry
channels:
  - conda-forge
dependencies:
  - python=3.11
  # core runtime
  - numpy
  - scipy
  - jax
  - h5py
  - click
  - sympy
  - typing_extensions
  - unyt
  # dev / test
  - pre-commit
  - pytest
  - pytest-cov
  - pytest-mpl
  - black
  - ruff
  - mypy
  - hypothesis
  # docs
  - sphinx
  - furo
  - myst-nb
  - sphinx-design
  - sphinx-copybutton
  - matplotlib
  - plotly
  - ipykernel
  - nbformat
  # CI helpers
  - pyyaml
  - jsonschema
  - jq
  # compilers / build tools
  - gcc
  - gxx
  - gfortran
  - make
  - git
  # agent tooling (Codex and Gemini CLIs run on Node; operators
  # npm-install the CLIs themselves once Node is available)
  - nodejs
  # GPU / CUDA 12 (WSL2 and Linux with NVIDIA driver)
  # jaxlib (CPU base) comes from conda-forge above; GPU dispatch is
  # wired in via the pip CUDA 12 plugins below.
  - cuda-toolkit=12.*
  - cudnn
  - pip
  - pip:
    - jax-cuda12-plugin==0.9.2
    - jax-cuda12-pjrt==0.9.2
