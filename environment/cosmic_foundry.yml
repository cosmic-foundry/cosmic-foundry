name: cosmic_foundry
channels:
  - conda-forge
dependencies:
  - python=3.11
  # core runtime
  - numpy
  - scipy
  - jax
  - h5py
  - click
  - sympy
  - typing_extensions
  - unyt
  # dev / test
  - pre-commit
  - pytest
  - pytest-cov
  - pytest-mpl
  - black
  - ruff
  - mypy
  - hypothesis
  # docs
  - sphinx
  - furo
  - myst-nb
  - sphinx-design
  - sphinx-copybutton
  - matplotlib
  - plotly
  - ipykernel
  - nbformat
  # CI helpers
  - pyyaml
  - jsonschema
  - jq
  # compilers / build tools
  - gcc
  - gxx
  - gfortran
  - make
  - git
  # agent tooling (Codex and Gemini CLIs run on Node; operators
  # npm-install the CLIs themselves once Node is available)
  - nodejs
