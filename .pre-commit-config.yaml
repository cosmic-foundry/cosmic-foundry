repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-toml

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args:
          - --builtin=clear,rare,en-GB_to_en-US
          # fof: Friends-Of-Friends, halo-finder algorithm (astrophysics term).
          - --ignore-words-list=fof
        files: \.(md|py|rst)$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-setuptools
          - click
        args: [--config-file=pyproject.toml]
        files: ^cosmic_foundry/

  - repo: local
    hooks:
      - id: markdown-link-integrity
        name: Markdown link integrity
        entry: python scripts/ci/check_markdown_links.py
        language: system
        pass_filenames: false
        files: \.md$
      - id: adr-index-consistency
        name: ADR index consistency
        entry: python scripts/ci/check_adr_index.py
        language: system
        pass_filenames: false
        files: ^adr/.*\.md$
      - id: action-version-downgrade
        name: GitHub Actions version downgrade check
        entry: python scripts/ci/check_action_versions.py
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$
      - id: claude-glue-installer
        name: Claude Code glue installer produces expected files
        entry: python scripts/ci/check_claude_glue.py
        language: system
        pass_filenames: false
        files: ^(scripts/install_claude_glue\.sh|scripts/ci/check_claude_glue\.py|pr-review/)
