repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-toml

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args:
          - --builtin=clear,rare,en-GB_to_en-US
          # fof: Friends-Of-Friends, halo-finder algorithm (astrophysics term).
          # singe: proper noun — Singe DSL (Bauer, Treichler, Aiken, PPoPP 2014).
          - --ignore-words-list=fof,singe
        files: \.(md|py|rst)$

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: environment/miniforge/

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy cosmic_foundry
        language: system
        pass_filenames: false
        files: ^cosmic_foundry/
      - id: markdown-link-integrity
        name: Markdown link integrity
        entry: python scripts/ci/check_markdown_links.py
        language: system
        pass_filenames: false
        files: \.md$
      - id: action-version-downgrade
        name: GitHub Actions version downgrade check
        entry: python scripts/ci/check_action_versions.py
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$
      - id: numeric-imports
        name: Numeric imports outside computation/
        entry: python scripts/ci/check_numeric_imports.py
        language: system
        pass_filenames: false
        files: ^cosmic_foundry/
