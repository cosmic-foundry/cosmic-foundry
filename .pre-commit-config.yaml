repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
  - repo: local
    hooks:
      - id: markdown-link-integrity
        name: Markdown link integrity
        entry: python scripts/ci/check_markdown_links.py
        language: system
        pass_filenames: false
        files: \.md$
      - id: adr-index-consistency
        name: ADR index consistency
        entry: python scripts/ci/check_adr_index.py
        language: system
        pass_filenames: false
        files: ^adr/.*\.md$
